# ============================================================
# Default Experiment Configuration
# ============================================================

# --- Dataset ---
dataset:
  default: tdrive                  # tdrive | cdtaxi
  tdrive:
    path: data/processed/tdrive
    type: single_node
  cdtaxi:
    path: data/processed/cdtaxi
    type: distributed

# --- Default Method Parameters ---
params:
  resolution: 8                    # Hierarchical grid depth (default)
  alpha: 3                         # Space-unit row subdivision
  beta: 3                          # Space-unit column subdivision
  minTrajs: 3                      # Minimum trajectories for leaf split

# --- Query Settings ---
query:
  distribution: SKE                # UNI | SKE | GUS (default: Skewed)
  range_m: 500                     # Query window side length in metres
  type: SRQ                        # SRQ | SS | top-k
  num_queries: 1000                # Number of queries per experiment run

# --- Distributed Settings ---
distributed:
  nodes: 4                         # Number of distributed nodes

# --- Experiment Sweep Ranges ---
sweep:
  resolution:    [6, 7, 8, 9, 10]
  minTrajs:      [1, 2, 3, 4, 5]
  alpha_beta:    [[2, 2], [3, 3], [4, 4], [5, 5]]
  distributions: [UNI, SKE, GUS]
  query_ranges:  [100, 500, 1000, 1500, 2000]
  nodes:         [2, 4, 6, 8]
  data_scales:   [100, 500, 1000, 2000]   # multipliers of base dataset
  query_types:   [SRQ, SS, top-k]

# --- Output ---
output:
  results_dir: results
  log_format: csv                  # csv | json

# --- Java / JAR Settings ---
java:
  bin: java                        # Override with full path if needed, e.g. /usr/bin/java
  jar_dir: experiments/jars        # Directory containing TMan.jar, LMSFC.jar, BMTree.jar
  jvm_opts: "-Xmx8g"              # JVM heap size (increase for large datasets)
  timeout_s: 3600                  # Per-command subprocess timeout in seconds

# --- Reproducibility ---
seed: 42
